<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modules | Index</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 2rem 1.5rem;
        }

        .buttons-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .module-btn {
            width: 100%;
            padding: 14px 20px;
            font-size: 18px;
            font-weight: 500;
            font-family: inherit;
            border: 1px solid #ddd;
            border-radius: 12px;
            background: white;
            color: #1e293b;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .module-btn.active {
            background: #2563eb;
            border-color: #2563eb;
            color: white;
            cursor: pointer;
        }

        .module-btn.active:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37,99,235,0.2);
        }

        .module-btn.inactive {
            background: #f1f5f9;
            border-color: #e2e8f0;
            color: #94a3b8;
            cursor: not-allowed;
        }

        .footer {
            margin-top: 32px;
            text-align: center;
            font-size: 13px;
            color: #94a3b8;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 1.5rem;
            }
            .module-btn {
                padding: 12px 16px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="buttons-wrapper" id="buttonsContainer"></div>
        <div class="footer">
            © @48i9 [itsme]
        </div>
    </div>

    <script>
        const container = document.getElementById('buttonsContainer');
        const totalModules = 10;
        const activeModule = 4;

        for (let i = 1; i <= totalModules; i++) {
            const isActive = (i === activeModule);
            const button = document.createElement('button');
            button.textContent = `Module ${i}`;
            button.className = `module-btn ${isActive ? 'active' : 'inactive'}`;
            
            if (isActive) {
                button.addEventListener('click', () => {
                    window.location.href = 'Module4';
                });
            } else {
                button.addEventListener('click', () => {
                    // silently do nothing - inactive
                });
            }
            
            container.appendChild(button);
        }
    </script>
</body>
</html>
